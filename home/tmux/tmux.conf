# プレフィックスをCtrl + g から Ctrl + s に変更
set-option -g prefix C-s

# Prefix + r で設定ファイルを再読み込みし、メッセージを表示する
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# ステータスラインをオフにする
# set -g status off

# ステータスラインの背景を透明にし、文字色をグレーにする
set -g status-style fg=colour242,bg=default

# 左側の表示（セッション名など）をシンプルに
set -g status-left "#[fg=colour240] #S "

# 右側の表示（時計など）を消す
set -g status-right ""

# ステータスラインを下に配置（上の方が目立つため）
set -g status-position bottom

# 全体の色：背景は透明、文字は落ち着いたグレー
set -g status-style fg=white,bg=default

# 左側：セッション名だけを控えめに表示
set -g status-left "#[fg=cyan,bg=default] #S #[default] "

# 中央：ウィンドウリスト（現在開いているタブ）の装飾を削る
setw -g window-status-current-style fg=white,bold,bg=colour236
setw -g window-status-style fg=colour242,bg=default

# 右側：何も表示しない
set -g status-right ""

# Prefix + - で水平分割（上下分割）
bind - split-window -v

# Prefix + \ で垂直分割（左右分割）
bind \\ split-window -h

# マウス操作を有効にする (ペインのリサイズやスクロールが可能に)
set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# 256色表示に対応
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# prefix + x で確認なしにペインを閉じる
bind-key x kill-pane

# コピーモードの設定
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -sel clip"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -sel clip"

# デフォルトシェルをfishに設定
set-option -g default-shell /usr/bin/fish